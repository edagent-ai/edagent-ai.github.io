<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — edagent.ai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    h1 span { color: #58a6ff; }

    p {
      color: #8b949e;
      font-size: 1rem;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #30363d;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      transition: border-color 0.2s;
    }

    a:hover { border-color: #58a6ff; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      color: #8b949e;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="icon">🚧</div>
  <h1>Something's coming<br /><span>for learners everywhere</span></h1>
  <p>We're building open-source AI tools for education. Check back soon.</p>
  <a href="https://github.com/edagent-ai" target="_blank" rel="noopener">View on GitHub</a>

  <footer>Open-source AI tools for education</footer>

</body>
</html>
